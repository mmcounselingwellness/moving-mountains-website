<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <meta name="robots" content="index">

  <!-- Analytics Manager - Load BEFORE Google Analytics -->
  <script src="../js/analytics-manager.js"></script>

  <!-- Title and description will be set by JavaScript -->
  <title>Blog Post | Moving Mountains Counseling & Wellness</title>
  <meta name="description" content="Read the latest from Moving Mountains Counseling & Wellness">

  <link href="../dist/output.css" rel="stylesheet">
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <script type="module" src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindplus/elements@1" type="module"></script>

  <!-- Google Font: Fraunces -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@700&family=Raleway:wght@400;600;700&display=swap" rel="stylesheet">

  <!-- Marked.js for Markdown rendering -->
  <script src="https://cdn.jsdelivr.net/npm/marked@11.1.1/marked.min.js"></script>

  <!-- Component Loader -->
  <script src="../js/components.js"></script>

  <!-- Blog Renderer -->
  <script src="../js/blog.js"></script>

  <!-- Cookie Consent Manager -->
  <script src="../js/cookie-consent.js"></script>

</head>

<body class="font-raleway bg-custom">

  <!-- Header Component -->
  <div id="header-component"></div>
  <!-- End Header Component -->

  <!-- Blog Post -->
  <article class="bg-white  py-8 sm:py-8">
    <div id="blog-post-container" class="mx-auto max-w-4xl px-6 lg:px-8">
      <!-- Blog post will be dynamically loaded here -->
      <div class="text-center py-12">
        <p class="text-gray-600">Loading post...</p>
      </div>
    </div>
  </article>
  <!-- End Blog Post -->

  <!-- Footer Component -->
  <div id="footer-component"></div>
  <!-- End Footer Component -->

  <!-- Cookie Consent Component -->
  <div id="cookie-consent-component"></div>
  <!-- End Cookie Consent Component -->

</body>
</html>
