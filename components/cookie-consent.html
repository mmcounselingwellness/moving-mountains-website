<!-- Analytics Opt-Out Banner -->
<div id="cookie-consent-banner" class="fixed bottom-0 left-0 right-0 z-50 bg-white shadow-lg border-t border-gray-200 hidden" role="dialog" aria-labelledby="cookie-consent-title" aria-describedby="cookie-consent-description">
  <div class="mx-auto max-w-7xl px-6 py-4 sm:py-5 lg:px-8">
    <div class="flex flex-col gap-4 sm:flex-row sm:items-center sm:justify-between">
      <div class="flex-1">
        <p id="cookie-consent-title" class="text-sm font-semibold text-heading">Privacy &amp; Analytics</p>
        <p id="cookie-consent-description" class="mt-1 text-sm text-gray-600">
          We use analytics to improve your experience on our site. You can choose to accept or decline analytics tracking. Your choice will be saved for future visits.
        </p>
      </div>
      <div class="flex flex-col gap-2 sm:flex-row sm:gap-3">
        <button id="decline-analytics" type="button" class="inline-flex items-center justify-center rounded-lg border border-gray-300 bg-white px-4 py-2 text-sm font-medium text-gray-700 hover:bg-gray-50 focus:outline-2 focus:outline-offset-2 focus:outline-heading transition-colors">
          Decline
        </button>
        <button id="accept-analytics" type="button" class="inline-flex items-center justify-center rounded-lg bg-primary px-4 py-2 text-sm font-medium text-white hover:bg-secondary focus:outline-2 focus:outline-offset-2 focus:outline-primary transition-colors">
          Accept
        </button>
      </div>
    </div>
  </div>
</div>
